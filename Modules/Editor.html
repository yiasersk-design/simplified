<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Design Interface</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML2Canvas for Download Feature -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* মূল ব্যাকগ্রাউন্ড এবং সাধারণ স্টাইল */
        body {
            background-color: #F3F4F6;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain; /* Prevent pull-to-refresh on mobile */
        }
        
        .header-gradient {
            background: linear-gradient(90deg, #FFFFFF 0%, #F9FAFB 100%);
        }
        
        .toolbar-text {
            font-size: 10px;
            line-height: 12px;
            margin-top: 4px;
            color: inherit;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        
        .toolbar-item, .submenu-item, .back-btn {
            color: #5F6368;
            background-color: transparent;
            transition: color 0.2s ease-in-out;
        }
        
        .toolbar-item:hover, .toolbar-item:active,
        .submenu-item:hover, .submenu-item:active,
        .back-btn:hover, .back-btn:active {
            color: #202124;
            background-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .menu-container {
            position: relative;
            width: 100%;
            height: 64px;
            overflow: hidden; 
        }

        .menu-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }

        #main-menu {
            z-index: 10;
        }

        .submenu-panel {
            z-index: 20;
            background-color: #F3F4F6; 
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1); 
        }

        .submenu-panel.active-state {
            transform: translateY(0);
        }

        /* Grid Pattern for design alignment */
        .grid-bg {
            background-size: 20px 20px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
        }
    /* ================= COLOR PICKER 3D STYLES (Inline) ================= */
        .color-picker-container {
            display: flex;
            transform-style: preserve-3d;
            transform: perspective(1000px);
            align-items: center;
        }

        .item-color {
            position: relative;
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border: none;
            outline: none;
            transition: 500ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
            cursor: pointer;
            background: transparent;
        }

        .item-color::after {
            position: absolute;
            content: "";
            inset: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color);
            border-radius: 6px;
            pointer-events: none;
            transition: 500ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .item-color[style*="#ffffff"]::after {
            border: 1px solid #d1d5db;
        }

        .item-color:hover {
            transform: scale(1.5);
            z-index: 99999;
        }

        .item-color:active::after {
            transform: scale(0.9);
        }

        .item-color:hover + * {
            transform: scale(1.3);
            z-index: 9999;
        }

        .item-color:hover + * + * {
            transform: scale(1.15);
            z-index: 999;
        }

        .item-color:has(+ *:hover) {
            transform: scale(1.3);
            z-index: 9999;
        }

        .item-color:has(+ * + *:hover) {
            transform: scale(1.15);
            z-index: 999;
        } </style>
</head>

    </div>  <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const canvasContainer = document.getElementById('design-canvas');
            let activeElement = null; 

            // ==========================================
            // 1. Menu Animations
            // ==========================================
            const mainTools = document.querySelectorAll('.main-tool');
            const subPanels = document.querySelectorAll('.submenu-panel');
            const backButtons = document.querySelectorAll('.back-btn');

            mainTools.forEach(tool => {
                tool.addEventListener('click', () => {
                    const targetId = tool.getAttribute('data-target');
                    if (targetId === 'none') return;
                    const targetPanel = document.getElementById(targetId);
                    if (targetPanel) {
                        subPanels.forEach(p => p.classList.remove('active-state'));
                        targetPanel.classList.add('active-state');
                    }
                });
            });

            backButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    subPanels.forEach(p => p.classList.remove('active-state'));
                });
            });

            // ==========================================
            // 2. Undo / Redo / History State Management
            // ==========================================
            let history =[];
            let historyIndex = -1;

            function saveState() {
                // Remove selection border before saving
                let previouslyActive = activeElement;
                setActive(null);
                
                let currentState = canvasContainer.innerHTML;
                
                // If we are overriding undone history
                if (historyIndex < history.length - 1) {
                    history = history.slice(0, historyIndex + 1);
                }
                
                history.push(currentState);
                historyIndex++;
                updateHeaderButtons();
                
                // Reselect the element after saving
                if(previouslyActive) setActive(previouslyActive);
            }

            function updateHeaderButtons() {
                const btnUndo = document.getElementById('btn-undo');
                const btnRedo = document.getElementById('btn-redo');
                
                if (historyIndex > 0) {
                    btnUndo.classList.replace('opacity-50', 'opacity-100');
                    btnUndo.classList.add('hover:opacity-80', 'cursor-pointer');
                    btnUndo.disabled = false;
                } else {
                    btnUndo.classList.replace('opacity-100', 'opacity-50');
                    btnUndo.classList.remove('hover:opacity-80', 'cursor-pointer');
                    btnUndo.disabled = true;
                }

                if (historyIndex < history.length - 1) {
                    btnRedo.classList.replace('opacity-50', 'opacity-100');
                    btnRedo.classList.add('hover:opacity-80', 'cursor-pointer');
                    btnRedo.disabled = false;
                } else {
                    btnRedo.classList.replace('opacity-100', 'opacity-50');
                    btnRedo.classList.remove('hover:opacity-80', 'cursor-pointer');
                    btnRedo.disabled = true;
                }
            }

            // Save Initial State
            saveState();

            document.getElementById('btn-undo').addEventListener('click', () => {
                if (historyIndex > 0) {
                    historyIndex--;
                    restoreState(history[historyIndex]);
                }
            });

            document.getElementById('btn-redo').addEventListener('click', () => {
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    restoreState(history[historyIndex]);
                }
            });

            function restoreState(content) {
                setActive(null);
                canvasContainer.innerHTML = content;
                // Re-bind dragging and clicking events to elements restored from string
                const elements = canvasContainer.querySelectorAll('.inserted-element');
                elements.forEach(el => makeInteractive(el));
                updateHeaderButtons();
            }

            // ==========================================
            // 3. Selection, Drag/Drop & Resize Logic
            // ==========================================
            function createResizeHandle() {
                let handle = document.createElement('div');
                handle.id = 'resize-handle';
                // একটি সুন্দর নীল রঙের গোলাকার বাটন (Resize dot)
                handle.className = 'absolute w-6 h-6 bg-blue-600 border-[3px] border-white rounded-full shadow-md z-[60] cursor-se-resize touch-none flex justify-center items-center';
                handle.innerHTML = '<div class="w-1.5 h-1.5 bg-white rounded-full pointer-events-none"></div>';
                
                let isResizing = false;
                let startX, startY, startWidth, startHeight, startLeft, startTop;

                function initResize(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    if (!activeElement) return;
                    isResizing = true;
                    
                    let evt = e.type.includes('touch') ? e.touches[0] : e;
                    startX = evt.clientX;
                    startY = evt.clientY;
                    startWidth = activeElement.offsetWidth;
                    startHeight = activeElement.offsetHeight;
                    startLeft = activeElement.offsetLeft;
                    startTop = activeElement.offsetTop;

                    document.addEventListener('mousemove', resizeElement);
                    document.addEventListener('touchmove', resizeElement, { passive: false });
                    document.addEventListener('mouseup', stopResize);
                    document.addEventListener('touchend', stopResize);
                }

                function resizeElement(e) {
                    if (!isResizing || !activeElement) return;
                    e.preventDefault();

                    // ক্যানভাস জুম অবস্থায় থাকলে তার পারফেক্ট ক্যালকুলেশন
                    let scale = typeof currentScale !== 'undefined' ? currentScale : 1;
                    
                    let evt = e.type.includes('touch') ? e.touches[0] : e;
                    let dx = (evt.clientX - startX) / scale;
                    let dy = (evt.clientY - startY) / scale;

                    if (activeElement.tagName === 'IMG') {
                        // ছবির Aspect Ratio (মৌলিক আকার) ঠিক রাখার লজিক
                        let ratio = startWidth / startHeight;
                        let newWidth = Math.max(40, startWidth + dx); // কমপক্ষে 40px হতে হবে
                        let newHeight = newWidth / ratio;
                        activeElement.style.width = newWidth + 'px';
                        activeElement.style.height = newHeight + 'px';
                    } else {
                        // টেক্সট বা অন্যান্য বক্সের জন্য ফ্রি-রিসাইজ
                        activeElement.style.width = Math.max(40, startWidth + dx) + 'px';
                        activeElement.style.height = Math.max(40, startHeight + dy) + 'px';
                    }

                    updateResizeHandlePosition();
                }

                function stopResize() {
                    isResizing = false;
                    document.removeEventListener('mousemove', resizeElement);
                    document.removeEventListener('touchmove', resizeElement);
                    document.removeEventListener('mouseup', stopResize);
                    document.removeEventListener('touchend', stopResize);
                    saveState(); // নতুন সাইজ সেভ হবে
                }

                handle.addEventListener('mousedown', initResize);
                handle.addEventListener('touchstart', initResize, { passive: false });

                canvasContainer.appendChild(handle);
            }

            function updateResizeHandlePosition() {
                let handle = document.getElementById('resize-handle');
                if (activeElement && handle) {
                    // ডটের পজিশন ছবির ঠিক ডানদিকের নিচে কোণায় সেট হবে
                    handle.style.left = (activeElement.offsetLeft + activeElement.offsetWidth - 12) + 'px';
                    handle.style.top = (activeElement.offsetTop + activeElement.offsetHeight - 12) + 'px';
                }
            }

            function setActive(el) {
                if (activeElement) {
                    activeElement.style.outline = 'none';
                    activeElement.style.boxShadow = 'none';
                }
                
                // নতুন কিছু সিলেক্ট করার আগে আগের ডট মুছে ফেলা
                let handle = document.getElementById('resize-handle');
                if (handle) handle.remove(); 
                
                activeElement = el;
                
                if (activeElement) {
                    activeElement.style.outline = '2px dashed #3b82f6';
                    activeElement.style.outlineOffset = '4px';
                    
                    // নতুন সিলেক্টেড ইলিমেন্টের সাথে ডট যুক্ত করা
                    createResizeHandle();
                    updateResizeHandlePosition();
                }
            }

            // ক্যানভাসের ফাঁকা জায়গায় ক্লিক করলে সিলেকশন বাতিল হবে
            canvasContainer.addEventListener('click', (e) => {
                if (e.target === canvasContainer || e.target.id === 'main-bg-image' || e.target.id === 'canvas-watermark') {
                    setActive(null);
                }
            });

            function makeInteractive(el) {
                el.classList.add('inserted-element');
                
                // Allow selection and text editing
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    setActive(el);
                });

                // Auto-save state when text is changed
                if(el.contentEditable === 'true') {
                    el.addEventListener('blur', saveState);
                }

                // Drag functionality
                let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                
                el.onmousedown = dragMouseDown;
                el.ontouchstart = dragMouseDown;

                function dragMouseDown(e) {
                    // ডটে ক্লিক করলে যাতে ড্র্যাগ না হয়, তার প্রটেকশন
                    if (e.target.id === 'resize-handle' || e.target.closest('#resize-handle')) return;
                    
                    if (e.target !== el && !el.contains(e.target)) return;
                    e.stopPropagation();
                    setActive(el);
                    
                    let evt = e.type.includes('touch') ? e.touches[0] : e;
                    pos3 = evt.clientX;
                    pos4 = evt.clientY;
                    
                    document.onmouseup = closeDragElement;
                    document.ontouchend = closeDragElement;
                    document.onmousemove = elementDrag;
                    document.ontouchmove = elementDrag;
                }

                function elementDrag(e) {
                    if (e.cancelable) e.preventDefault(); 
                    
                    // জুম অবস্থায় ড্র্যাগিং স্পিড পারফেক্ট করার ক্যালকুলেশন
                    let scale = typeof currentScale !== 'undefined' ? currentScale : 1;
                    let evt = e.type.includes('touch') ? e.touches[0] : e;
                    
                    pos1 = (pos3 - evt.clientX) / scale;
                    pos2 = (pos4 - evt.clientY) / scale;
                    pos3 = evt.clientX;
                    pos4 = evt.clientY;
                    
                    el.style.top = (el.offsetTop - pos2) + "px";
                    el.style.left = (el.offsetLeft - pos1) + "px";
                    
                    updateResizeHandlePosition(); // ড্র্যাগ করার সময় ডট সাথে মুভ করবে
                }

                function closeDragElement() {
                    document.onmouseup = null;
                    document.onmousemove = null;
                    document.ontouchend = null;
                    document.ontouchmove = null;
                    saveState(); // Save state after moving element
                }
            }

            // ==========================================
            // 4. Header Actions (Menu, Options, Export)
            // ==========================================
            
            // Fullscreen Toggle
            document.getElementById('btn-menu').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        alert(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            });

            // Full Canvas Mode & Floating Toolbox Logic (with Drag Support)
            const btnCanvasOnlyMode = document.getElementById('btn-canvas-only-mode');
            const btnExitCanvasMode = document.getElementById('btn-exit-canvas-mode');
            const normalHeaderContent = document.getElementById('normal-header-content');
            const canvasModeHeaderContent = document.getElementById('canvas-mode-header-content');
            const appFooter = document.querySelector('footer');
            
            // Floating Toolbox Elements
            const floatingToolbox = document.getElementById('floating-toolbox');
            const btnToolboxToggle = document.getElementById('btn-toolbox-toggle');
            const toolboxOptions = document.getElementById('toolbox-options');
            const toolboxBtns = document.querySelectorAll('.toolbox-btn');

            // --- Gesture-Based Zoom & Pan Variables & Logic ---
            let isZoomModeActive = false;
            let currentScale = 1;
            let currentPanX = 0;
            let currentPanY = 0;

            const btnZoomToggle = document.getElementById('btn-zoom-toggle');
            const zoomPercentageText = document.getElementById('zoom-percentage-text');
            const mainWorkspace = document.querySelector('main');

            function updateCanvasTransform() {
                if (canvasContainer) {
                    // --- Improved Boundary Control Logic (Clamping) ---
                    const canvasWidth = canvasContainer.offsetWidth;
                    const canvasHeight = canvasContainer.offsetHeight;
                    
                    // Calculate exact visual panning limits regardless of canvas scale
                    // Using Math.abs ensures smooth panning even if canvas is smaller than screen
                    const maxPanX = Math.abs(mainWorkspace.clientWidth - (canvasWidth * currentScale)) / 2;
                    const maxPanY = Math.abs(mainWorkspace.clientHeight - (canvasHeight * currentScale)) / 2;
                    
                    // Clamp (restrict) panning values to keep it within the screen boundaries safely
                    currentPanX = Math.max(-maxPanX, Math.min(maxPanX, currentPanX));
                    currentPanY = Math.max(-maxPanY, Math.min(maxPanY, currentPanY));
                    
                    // Apply smooth translation and scaling
                    canvasContainer.style.transform = `translate(${currentPanX}px, ${currentPanY}px) scale(${currentScale})`;
                }
                if (zoomPercentageText) {
                    zoomPercentageText.innerText = Math.round(currentScale * 100) + '%';
                }
            }

            function enterCanvasOnlyMode() {
                normalHeaderContent.classList.add('hidden');
                normalHeaderContent.classList.remove('flex');
                canvasModeHeaderContent.classList.remove('hidden');
                canvasModeHeaderContent.classList.add('flex');
                
                appFooter.classList.add('hidden');
                
                if (floatingToolbox) {
                    floatingToolbox.classList.remove('hidden');
                    floatingToolbox.classList.add('flex');
                }
                
                const floatingColorPicker = document.getElementById('floating-color-picker');
                if (floatingColorPicker) {
                    floatingColorPicker.classList.add('opacity-0', 'translate-y-8');
                    floatingColorPicker.classList.remove('opacity-100', 'translate-y-0');
                }
            }

            function exitCanvasOnlyMode() {
                canvasModeHeaderContent.classList.add('hidden');
                canvasModeHeaderContent.classList.remove('flex');
                normalHeaderContent.classList.remove('hidden');
                normalHeaderContent.classList.add('flex');
                
                appFooter.classList.remove('hidden');
                
                if (floatingToolbox) {
                    floatingToolbox.classList.add('hidden');
                    floatingToolbox.classList.remove('flex');
                    toolboxOptions.classList.add('scale-y-0', 'opacity-0', 'pointer-events-none', '-translate-y-2');
                    toolboxOptions.classList.remove('scale-y-100', 'opacity-100', 'pointer-events-auto', 'translate-y-0');
                    btnToolboxToggle.classList.remove('bg-blue-50', 'text-blue-600', 'border-blue-200');
                }

                // Completely disable Zoom Mode and Reset Canvas when exiting Full Screen
                if (isZoomModeActive) {
                    toggleGestureZoomMode();
                }
            }

            if (btnCanvasOnlyMode) btnCanvasOnlyMode.addEventListener('click', enterCanvasOnlyMode);
            if (btnExitCanvasMode) btnExitCanvasMode.addEventListener('click', exitCanvasOnlyMode);

            // --- Toggle Gesture Zoom Mode ---
            function toggleGestureZoomMode() {
                isZoomModeActive = !isZoomModeActive;
                if (isZoomModeActive) {
                    // Activate Zoom Mode
                    btnZoomToggle.classList.add('bg-blue-100', 'text-blue-600');
                    btnZoomToggle.classList.remove('text-gray-700');
                    zoomPercentageText.classList.remove('hidden');
                    zoomPercentageText.innerText = Math.round(currentScale * 100) + '%';
                    
                    // Remove transition for instant real-time finger tracking
                    canvasContainer.classList.remove('transition-all', 'duration-300');
                } else {
                    // Deactivate and Reset Zoom Mode
                    btnZoomToggle.classList.remove('bg-blue-100', 'text-blue-600');
                    btnZoomToggle.classList.add('text-gray-700');
                    zoomPercentageText.classList.add('hidden');
                    
                    currentScale = 1;
                    currentPanX = 0;
                    currentPanY = 0;
                    
                    // Add smooth transition back for the reset animation
                    canvasContainer.classList.add('transition-all', 'duration-300');
                    updateCanvasTransform();
                }
            }

            if (btnZoomToggle) {
                btnZoomToggle.addEventListener('click', toggleGestureZoomMode);
            }

            // --- Touch & Mouse Gestures for Zooming and Panning ---
            let initialDistance = null;
            let initialScale = 1;
            let isPanningWorkspace = false;
            let wsStartX = 0, wsStartY = 0;
            let initialPanX = 0, initialPanY = 0;

            mainWorkspace.addEventListener('touchstart', (e) => {
                if (!isZoomModeActive) return;
                // Ignore gestures if touching the floating toolbox UI
                if (e.target.closest('#floating-toolbox')) return;

                if (e.touches.length === 2) {
                    // Pinch Zoom Start
                    isPanningWorkspace = false;
                    initialDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    initialScale = currentScale;
                } else if (e.touches.length === 1) {
                    // Pan Start
                    isPanningWorkspace = true;
                    wsStartX = e.touches[0].clientX;
                    wsStartY = e.touches[0].clientY;
                    initialPanX = currentPanX;
                    initialPanY = currentPanY;
                }
            }, { passive: false });

            mainWorkspace.addEventListener('touchmove', (e) => {
                if (!isZoomModeActive) return;
                if (e.target.closest('#floating-toolbox')) return;
                
                // Prevent screen refreshing/scrolling while zooming
                if (e.cancelable) e.preventDefault();

                if (e.touches.length === 2) {
                    // Pinching
                    isPanningWorkspace = false;
                    const currentDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    if (initialDistance) {
                        const scaleDiff = currentDistance / initialDistance;
                        currentScale = Math.min(Math.max(initialScale * scaleDiff, 0.5), 5); // Limit 50% - 500%
                        updateCanvasTransform();
                    }
                } else if (e.touches.length === 1 && isPanningWorkspace) {
                    // Panning
                    const dx = e.touches[0].clientX - wsStartX;
                    const dy = e.touches[0].clientY - wsStartY;
                    currentPanX = initialPanX + dx;
                    currentPanY = initialPanY + dy;
                    updateCanvasTransform();
                }
            }, { passive: false });

            mainWorkspace.addEventListener('touchend', (e) => {
                if (!isZoomModeActive) return;
                if (e.touches.length < 2) initialDistance = null;
                if (e.touches.length === 0) isPanningWorkspace = false;
            });

            // Desktop Mouse Support for Panning and Scroll Wheel for Zooming
            mainWorkspace.addEventListener('mousedown', (e) => {
                if (!isZoomModeActive) return;
                if (e.target.closest('#floating-toolbox')) return;
                
                isPanningWorkspace = true;
                wsStartX = e.clientX;
                wsStartY = e.clientY;
                initialPanX = currentPanX;
                initialPanY = currentPanY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isZoomModeActive || !isPanningWorkspace || e.touches) return;
                e.preventDefault();
                const dx = e.clientX - wsStartX;
                const dy = e.clientY - wsStartY;
                currentPanX = initialPanX + dx;
                currentPanY = initialPanY + dy;
                updateCanvasTransform();
            });

            window.addEventListener('mouseup', () => {
                if (!isZoomModeActive || !isPanningWorkspace) return;
                isPanningWorkspace = false;
            });

            mainWorkspace.addEventListener('wheel', (e) => {
                if (!isZoomModeActive) return;
                e.preventDefault();
                if (e.ctrlKey || e.metaKey) {
                    // Zoom using Trackpad/Scrollwheel
                    const delta = e.deltaY * -0.01;
                    currentScale = Math.min(Math.max(currentScale + delta, 0.5), 5);
                } else {
                    // Pan using Trackpad/Scrollwheel
                    currentPanX -= e.deltaX;
                    currentPanY -= e.deltaY;
                }
                updateCanvasTransform();
            }, { passive: false });
            
            // --- Toolbox Drag & Drop Logic ---
            let isDraggingToolbox = false;
            let toolboxDragMoved = false;
            let tbStartX, tbStartY, tbStartLeft, tbStartTop;

            function onToolboxDragStart(e) {
                // Only start drag from the main square button
                if (!e.target.closest('#btn-toolbox-toggle')) return;
                
                isDraggingToolbox = true;
                toolboxDragMoved = false;

                let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                tbStartX = clientX;
                tbStartY = clientY;

                const rect = floatingToolbox.getBoundingClientRect();
                
                // Convert position to fixed left/top for dragging
                floatingToolbox.style.left = rect.left + 'px';
                floatingToolbox.style.top = rect.top + 'px';
                floatingToolbox.style.right = 'auto';
                floatingToolbox.style.bottom = 'auto';

                tbStartLeft = rect.left;
                tbStartTop = rect.top;
                
                btnToolboxToggle.style.cursor = 'grabbing';
            }

            function onToolboxDragMove(e) {
                if (!isDraggingToolbox) return;

                let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                let dx = clientX - tbStartX;
                let dy = clientY - tbStartY;

                // Threshold to differentiate a Click from a Drag (3 pixels)
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                    toolboxDragMoved = true;
                }

                if (toolboxDragMoved) {
                    e.preventDefault(); // Prevent scrolling on mobile while dragging

                    let newLeft = tbStartLeft + dx;
                    let newTop = tbStartTop + dy;

                    // Calculate Boundaries to keep it inside the screen
                    // We use rect width/height so even expanded options won't go off-screen
                    const rect = floatingToolbox.getBoundingClientRect();
                    const maxX = window.innerWidth - rect.width;
                    const maxY = window.innerHeight - rect.height;

                    if (newLeft < 0) newLeft = 0;
                    if (newTop < 0) newTop = 0;
                    if (newLeft > maxX) newLeft = maxX;
                    if (newTop > maxY) newTop = maxY;

                    floatingToolbox.style.left = newLeft + 'px';
                    floatingToolbox.style.top = newTop + 'px';
                }
            }

            function onToolboxDragEnd(e) {
                if (isDraggingToolbox) {
                    isDraggingToolbox = false;
                    btnToolboxToggle.style.cursor = 'grab';
                }
            }

            // Attach Drag Listeners globally for smooth dragging
            btnToolboxToggle.addEventListener('mousedown', onToolboxDragStart);
            btnToolboxToggle.addEventListener('touchstart', onToolboxDragStart, {passive: false});
            document.addEventListener('mousemove', onToolboxDragMove);
            document.addEventListener('touchmove', onToolboxDragMove, {passive: false});
            document.addEventListener('mouseup', onToolboxDragEnd);
            document.addEventListener('touchend', onToolboxDragEnd);
            
            // --- Toolbox Expand/Collapse Toggle ---
            if (btnToolboxToggle && toolboxOptions) {
                btnToolboxToggle.addEventListener('click', (e) => {
                    // Ignore click if the user was just dragging the button
                    if (toolboxDragMoved) {
                        toolboxDragMoved = false; 
                        return; 
                    }

                    if (toolboxOptions.classList.contains('scale-y-0')) {
                        toolboxOptions.classList.remove('scale-y-0', 'opacity-0', 'pointer-events-none', '-translate-y-2');
                        toolboxOptions.classList.add('scale-y-100', 'opacity-100', 'pointer-events-auto', 'translate-y-0');
                        btnToolboxToggle.classList.add('bg-blue-50', 'text-blue-600', 'border-blue-200');
                    } else {
                        toolboxOptions.classList.add('scale-y-0', 'opacity-0', 'pointer-events-none', '-translate-y-2');
                        toolboxOptions.classList.remove('scale-y-100', 'opacity-100', 'pointer-events-auto', 'translate-y-0');
                        btnToolboxToggle.classList.remove('bg-blue-50', 'text-blue-600', 'border-blue-200');
                    }
                });
            }
            
            // --- Toolbox Formatting Actions ---
            toolboxBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (activeElement && activeElement.tagName === 'DIV' && activeElement.id !== 'canvas-watermark') {
                        const tool = btn.getAttribute('data-tool');
                        
                        if (tool === 'bold') {
                            let weight = window.getComputedStyle(activeElement).fontWeight;
                            activeElement.style.fontWeight = (weight === '700' || weight === 'bold') ? 'normal' : 'bold';
                        } 
                        else if (tool === 'italic') {
                            activeElement.style.fontStyle = activeElement.style.fontStyle === 'italic' ? 'normal' : 'italic';
                        } 
                        else if (tool === 'underline') {
                            let dec = activeElement.style.textDecorationLine || '';
                            if (dec.includes('underline')) {
                                activeElement.style.textDecorationLine = dec.replace('underline', '').trim() || 'none';
                            } else {
                                activeElement.style.textDecorationLine = dec === 'none' ? 'underline' : dec + ' underline';
                            }
                        } 
                        else if (tool === 'strike') {
                            let dec = activeElement.style.textDecorationLine || '';
                            if (dec.includes('line-through')) {
                                activeElement.style.textDecorationLine = dec.replace('line-through', '').trim() || 'none';
                            } else {
                                activeElement.style.textDecorationLine = dec === 'none' ? 'line-through' : dec + ' line-through';
                            }
                        }
                        else if (tool === 'marker') {
                            activeElement.style.backgroundColor = activeElement.style.backgroundColor ? '' : 'rgba(253, 224, 71, 0.7)'; 
                        }
                        
                        saveState(); // Record change for undo/redo
                    } else {
                        alert("Please select a text element first to apply formatting.");
                    }
                });
            });

            // Export / Download (html2canvas)
            document.getElementById('btn-export').addEventListener('click', () => {
                setActive(null); // Deselect anything before capturing
                const btn = document.getElementById('btn-export');
                btn.classList.add('animate-pulse'); // Loading effect
                
                html2canvas(canvasContainer, { 
                    useCORS: true, 
                    allowTaint: true, 
                    scale: 2 // High quality
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'My-Design-App.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    btn.classList.remove('animate-pulse');
                }).catch(err => {
                    alert("Error exporting image!");
                    btn.classList.remove('animate-pulse');
                });
            });

            // ==========================================
            // 5. Main Toolbar Actions
            // ==========================================

            // Template Menu
            document.getElementById('btn-template').addEventListener('click', () => {
                const bgImage = document.getElementById('main-bg-image');
                // Fetch a random aesthetic image
                const randomId = Math.floor(Math.random() * 1000);
                bgImage.src = `https://picsum.photos/800/800?random=${randomId}`;
                
                // wait for image load to save state
                bgImage.onload = () => saveState();
            });

            // Reset Workspace
            document.getElementById('btn-reset').addEventListener('click', () => {
                if(confirm("Are you sure you want to completely reset your workspace?")) {
                    canvasContainer.className = 'bg-white shadow-[0_0_25px_rgba(0,0,0,0.15)] w-full max-w-[650px] aspect-square relative flex flex-col justify-center items-center overflow-hidden transition-all duration-300';
                    canvasContainer.innerHTML = '<img id="main-bg-image" src="https://placehold.co/800x800/ffffff/ffffff?text=+" alt="Canvas Artwork" class="w-full h-full object-cover pointer-events-none">';
                    setActive(null);
                    saveState();
                }
            });

            // ==========================================
            // 6. Layout Submenu Functionalities
            // ==========================================
            const layoutBtns = document.querySelectorAll('#submenu-layout .submenu-item');
            
            // Margin Size Slide-up Panel Logic
            const btnMargin = document.getElementById('btn-margin');
            const marginPanel = document.getElementById('margin-panel');
            const marginBackdrop = document.getElementById('margin-backdrop');
            const marginContent = document.getElementById('margin-content');
            const closeMarginPanelBtn = document.getElementById('close-margin-panel');
            const marginSizeBtns = document.querySelectorAll('.margin-size-btn');

            function openMarginPanel() {
                marginPanel.classList.remove('pointer-events-none');
                marginBackdrop.classList.remove('opacity-0', 'pointer-events-none');
                marginBackdrop.classList.add('opacity-100', 'pointer-events-auto');
                marginContent.classList.remove('translate-y-full');
            }

            function closeMarginPanel() {
                marginBackdrop.classList.remove('opacity-100', 'pointer-events-auto');
                marginBackdrop.classList.add('opacity-0', 'pointer-events-none');
                marginContent.classList.add('translate-y-full');
                setTimeout(() => {
                    marginPanel.classList.add('pointer-events-none');
                }, 300); // Wait for transition to complete
            }

            if (btnMargin) {
                btnMargin.addEventListener('click', openMarginPanel);
            } else {
                layoutBtns[0].addEventListener('click', openMarginPanel); // Fallback
            }
            
            closeMarginPanelBtn.addEventListener('click', closeMarginPanel);
            marginBackdrop.addEventListener('click', closeMarginPanel);

            // Applying the selected Margin
            marginSizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const marginClass = btn.getAttribute('data-margin');
                    
                    // Remove all previous padding/margin classes from canvas container
                    canvasContainer.classList.remove('p-0', 'p-1', 'p-2', 'p-4', 'p-6', 'p-8', 'p-10', 'p-12');
                    
                    // Add the new selected margin (padding) class
                    canvasContainer.classList.add(marginClass);
                    
                    saveState(); // Save to undo/redo history
                    closeMarginPanel(); // Close the slide-up panel
                });
            });
            
            // Canvas Size Slide-up Panel Logic
            const btnCanvasSize = document.getElementById('btn-canvas-size');
            const canvasSizePanel = document.getElementById('canvas-size-panel');
            const canvasSizeBackdrop = document.getElementById('canvas-size-backdrop');
            const canvasSizeContent = document.getElementById('canvas-size-content');
            const closeCanvasPanelBtn = document.getElementById('close-canvas-panel');
            const canvasSizeBtns = document.querySelectorAll('.canvas-size-btn');

            function openCanvasPanel() {
                canvasSizePanel.classList.remove('pointer-events-none');
                canvasSizeBackdrop.classList.remove('opacity-0', 'pointer-events-none');
                canvasSizeBackdrop.classList.add('opacity-100', 'pointer-events-auto');
                canvasSizeContent.classList.remove('translate-y-full');
            }

            function closeCanvasPanel() {
                canvasSizeBackdrop.classList.remove('opacity-100', 'pointer-events-auto');
                canvasSizeBackdrop.classList.add('opacity-0', 'pointer-events-none');
                canvasSizeContent.classList.add('translate-y-full');
                setTimeout(() => {
                    canvasSizePanel.classList.add('pointer-events-none');
                }, 300); // Wait for transition to complete
            }

            // Click events for opening and closing the panel
            if (btnCanvasSize) {
                btnCanvasSize.addEventListener('click', openCanvasPanel);
            } else {
                layoutBtns[1].addEventListener('click', openCanvasPanel); // Fallback
            }
            closeCanvasPanelBtn.addEventListener('click', closeCanvasPanel);
            canvasSizeBackdrop.addEventListener('click', closeCanvasPanel);

            // Applying the selected Canvas Size smoothly
            canvasSizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const ratio = btn.getAttribute('data-ratio');
                    
                    // Remove all previous aspect ratio classes
                    canvasContainer.classList.remove('aspect-square', 'aspect-video', 'aspect-[3/4]', 'aspect-[4/5]', 'aspect-[9/16]');
                    
                    // Add the new selected aspect ratio class
                    canvasContainer.classList.add(ratio);
                    
                    saveState(); // Save to undo/redo history
                    closeCanvasPanel(); // Close the slide-up panel
                });
            });
            
            // Floating Canvas Color Logic (Pops up above toolbar) - Applies to Border & Text
            const btnCanvasColor = document.getElementById('btn-canvas-color');
            const btnTextColor = document.getElementById('btn-text-color');
            const floatingColorPicker = document.getElementById('floating-color-picker');
            const colorItems = document.querySelectorAll('.item-color');
            
            let colorPickerTarget = 'border'; // Track what we are coloring ('border' or 'text')

            // Toggle floating picker visibility
            function toggleFloatingPicker(e, target) {
                if (e) e.stopPropagation();
                
                if (floatingColorPicker.classList.contains('opacity-0') || colorPickerTarget !== target) {
                    // Show Picker and set target mode
                    colorPickerTarget = target;
                    floatingColorPicker.classList.remove('opacity-0', 'translate-y-8');
                    floatingColorPicker.classList.add('opacity-100', 'translate-y-0');
                } else {
                    // Hide Picker
                    floatingColorPicker.classList.add('opacity-0', 'translate-y-8');
                    floatingColorPicker.classList.remove('opacity-100', 'translate-y-0');
                }
            }

            // Hide floating picker when clicking anywhere outside of it
            document.addEventListener('click', (e) => {
                if (floatingColorPicker && !floatingColorPicker.classList.contains('opacity-0') && 
                    !floatingColorPicker.contains(e.target) && 
                    (!btnCanvasColor || !btnCanvasColor.contains(e.target)) &&
                    (!btnTextColor || !btnTextColor.contains(e.target))) {
                    
                    floatingColorPicker.classList.add('opacity-0', 'translate-y-8');
                    floatingColorPicker.classList.remove('opacity-100', 'translate-y-0');
                }
            });

            // Bind click event to "Color" button in Layout submenu (for Border)
            if (btnCanvasColor) {
                btnCanvasColor.addEventListener('click', (e) => toggleFloatingPicker(e, 'border'));
            }
            
            // Bind click event to "Colour" button in Text Style submenu (for Text)
            if (btnTextColor) {
                btnTextColor.addEventListener('click', (e) => {
                    // Check if a text element is actively selected first
                    if (activeElement && activeElement.tagName === 'DIV' && activeElement.id !== 'canvas-watermark') {
                        toggleFloatingPicker(e, 'text');
                    } else {
                        alert("Please insert and select a text first.");
                    }
                });
            }

            // Applying the selected Color dynamically to Border or Text
            colorItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevent the document click event from firing
                    
                    const selectedColor = item.style.getPropertyValue('--color').trim();
                    
                    if (colorPickerTarget === 'border') {
                        // Apply new color directly to Border
                        canvasContainer.style.borderColor = selectedColor;
                    } else if (colorPickerTarget === 'text') {
                        // Apply new color to the active Text Element
                        if (activeElement) {
                            activeElement.style.color = selectedColor;
                        }
                    }
                    
                    saveState(); // Save to undo/redo history
                    
                    // Auto-hide the floating picker after selecting a color
                    floatingColorPicker.classList.add('opacity-0', 'translate-y-8');
                    floatingColorPicker.classList.remove('opacity-100', 'translate-y-0');
                });
            });
            
            // Border Size Slide-up Panel Logic
            const btnBorder = document.getElementById('btn-border');
            const borderPanel = document.getElementById('border-panel');
            const borderBackdrop = document.getElementById('border-backdrop');
            const borderContent = document.getElementById('border-content');
            const closeBorderPanelBtn = document.getElementById('close-border-panel');
            const borderSizeBtns = document.querySelectorAll('.border-size-btn');

            function openBorderPanel() {
                borderPanel.classList.remove('pointer-events-none');
                borderBackdrop.classList.remove('opacity-0', 'pointer-events-none');
                borderBackdrop.classList.add('opacity-100', 'pointer-events-auto');
                borderContent.classList.remove('translate-y-full');
            }

            function closeBorderPanel() {
                borderBackdrop.classList.remove('opacity-100', 'pointer-events-auto');
                borderBackdrop.classList.add('opacity-0', 'pointer-events-none');
                borderContent.classList.add('translate-y-full');
                setTimeout(() => {
                    borderPanel.classList.add('pointer-events-none');
                }, 300); // Wait for transition to complete
            }

            if (btnBorder) {
                btnBorder.addEventListener('click', openBorderPanel);
            } else if (layoutBtns[3]) {
                layoutBtns[3].addEventListener('click', openBorderPanel); // Fallback
            }
            
            closeBorderPanelBtn.addEventListener('click', closeBorderPanel);
            borderBackdrop.addEventListener('click', closeBorderPanel);

            // Applying the selected Border
            borderSizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const borderClass = btn.getAttribute('data-border');
                    
                    // Remove all previous border size and color classes
                    canvasContainer.classList.remove('border-0', 'border', 'border-2', 'border-4', 'border-8', 'border-gray-800');
                    
                    // Add the new selected border class and color (if it's not 'None')
                    if (borderClass !== 'border-0') {
                        canvasContainer.classList.add(borderClass, 'border-gray-800'); 
                    } else {
                        canvasContainer.classList.add('border-0');
                    }
                    
                    saveState(); // Save to undo/redo history
                    closeBorderPanel(); // Close the slide-up panel
                });
            });

            // ==========================================
            // 7. Text Style Submenu Functionalities
            // ==========================================
            const textStyleBtns = document.querySelectorAll('#submenu-textstyle .submenu-item');
            
            function styleText(callback) {
                if (activeElement && activeElement.tagName === 'DIV' && activeElement.id !== 'canvas-watermark') {
                    callback();
                    saveState();
                } else {
                    alert("Please insert and select a text first.");
                }
            }

            textStyleBtns[0].addEventListener('click', () => styleText(() => { 
                let currentSize = window.getComputedStyle(activeElement).fontSize;
                let sizeNum = parseFloat(currentSize);
                activeElement.style.fontSize = (sizeNum >= 64 ? 16 : sizeNum + 8) + 'px';
            }));
            
             
            
            textStyleBtns[2].addEventListener('click', () => styleText(() => { 
                let weight = window.getComputedStyle(activeElement).fontWeight;
                activeElement.style.fontWeight = (weight === '700' || weight === 'bold') ? 'normal' : 'bold';
            }));
            
            textStyleBtns[3].addEventListener('click', () => styleText(() => { 
                activeElement.style.fontStyle = activeElement.style.fontStyle === 'italic' ? 'normal' : 'italic';
            }));
            
            textStyleBtns[4].addEventListener('click', () => styleText(() => { 
                let dec = activeElement.style.textDecorationLine || '';
                if (dec.includes('underline')) {
                    activeElement.style.textDecorationLine = dec.replace('underline', '').trim() || 'none';
                } else {
                    activeElement.style.textDecorationLine = dec === 'none' ? 'underline' : dec + ' underline';
                }
            }));
            
            textStyleBtns[5].addEventListener('click', () => styleText(() => { 
                let dec = activeElement.style.textDecorationLine || '';
                if (dec.includes('line-through')) {
                    activeElement.style.textDecorationLine = dec.replace('line-through', '').trim() || 'none';
                } else {
                    activeElement.style.textDecorationLine = dec === 'none' ? 'line-through' : dec + ' line-through';
                }
            }));

            // ==========================================
            // Alignment Submenu Functionalities
            // ==========================================
            const alignBtns = document.querySelectorAll('.align-btn');
            alignBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    styleText(() => {
                        const alignment = btn.getAttribute('data-align');
                        activeElement.style.textAlign = alignment;
                        // Text Alignment যাতে ঠিকমতো দেখা যায় তার জন্য Width Adjust করা
                        if (!activeElement.style.width || activeElement.style.width === 'fit-content') {
                            activeElement.style.minWidth = '150px'; 
                        }
                    });
                });
            });

            // ==========================================
            // 8. Insert Submenu Functionalities
            // ==========================================
            const insertBtns = document.querySelectorAll('#submenu-insert .submenu-item');
            
            function createDraggableElement(type) {
                if (type === 'img') {
                    // Open Device Gallery/File Manager for Images
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.accept = 'image/*'; // Only accept images
                    
                    fileInput.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;

                        // Read the file and convert it into a valid image source (Base64)
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const el = document.createElement('img');
                            el.className = 'absolute z-20 transition-colors shadow-sm object-cover w-32 h-32 rounded cursor-move';
                            
                            // Initial starting position (Center roughly)
                            el.style.top = '100px';
                            el.style.left = '100px';
                            
                            el.src = event.target.result;
                            
                            makeInteractive(el);
                            canvasContainer.appendChild(el);
                            setActive(el);
                            saveState(); // Save state after image loads
                        };
                        reader.readAsDataURL(file);
                    };
                    
                    fileInput.click(); // Trigger the file picker dialog
                    
                } else {
                    // For Text and Heading
                    const el = document.createElement('div');
                    el.className = 'absolute z-20 transition-colors shadow-sm';
                    
                    // Initial starting position (Center roughly)
                    el.style.top = '100px';
                    el.style.left = '100px';

                    el.contentEditable = "true";
                    el.innerText = type === 'heading' ? "Heading Text" : "Simple Text";
                    el.className += type === 'heading' ? ' text-3xl font-bold text-gray-900 px-2 py-1 outline-none' : ' text-base text-gray-800 px-2 py-1 outline-none';
                    el.style.cursor = 'text';

                    makeInteractive(el);
                    canvasContainer.appendChild(el);
                    setActive(el);
                    saveState();
                }
            }
            
            insertBtns[0].addEventListener('click', () => createDraggableElement('text')); 
            insertBtns[1].addEventListener('click', () => createDraggableElement('heading'));  
            insertBtns[2].addEventListener('click', () => createDraggableElement('img'));

            // ==========================================
            // 9. Effects Submenu Functionalities
            // ==========================================
            const effectBtns = document.querySelectorAll('#submenu-effects .submenu-item');
            
            effectBtns[0].addEventListener('click', () => { 
                if (activeElement && activeElement.tagName === 'DIV' && activeElement.id !== 'canvas-watermark') {
                    activeElement.style.backgroundColor = activeElement.style.backgroundColor ? '' : 'rgba(253, 224, 71, 0.7)'; 
                    saveState();
                } else {
                    alert("Please select a text element first.");
                }
            });
            
            effectBtns[1].addEventListener('click', () => { 
                const existing = document.getElementById('canvas-watermark');
                if (existing) {
                    existing.remove();
                } else {
                    const wm = document.createElement('div');
                    wm.id = 'canvas-watermark';
                    wm.innerText = '© My Design';
                    wm.className = 'absolute bottom-2 right-4 text-gray-500 font-bold text-sm opacity-50 z-10 pointer-events-none select-none';
                    canvasContainer.appendChild(wm);
                }
                saveState();
            });

        });
    </script>
