<!DOCTYPE html>
<html lang="bn">
<head>

    <style>

        html, body { width: 100vw; height: 100dvh; margin: 0; padding: 0; overflow: hidden !important; overscroll-behavior: none !important; }
        body { font-family: 'Inter', sans-serif; position: fixed !important; top: 0; left: 0; right: 0; bottom: 0; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .text-primary { color: #111B21; }
        .text-secondary { color: #667781; }
        .text-icon { color: #54656F; }
        .text-whatsapp-light-green { color: #1FA855; }
        .bg-hover { transition: background-color 0.2s; }
        .bg-hover:active { background-color: #F0F2F5; }
    </style>

<body class="bg-gray-100 flex items-center justify-center w-full h-[100dvh] overflow-hidden overscroll-none">

<script>
window.showToast = function(msg, type) {
    const tc = document.getElementById('toastContainer');
    if(!tc) return;
    const t = document.createElement('div');
    t.className = `px-4 py-2 rounded-lg text-white text-sm shadow-lg ${type==='error'?'bg-red-500':'bg-green-500'} transition-opacity duration-300`;
    t.innerText = msg;
    tc.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
};

// Setting & Profile Logic
function openProfile() {
    document.getElementById('settings-view').classList.add('hidden');
    document.getElementById('settings-view').classList.remove('flex');
    document.getElementById('profile-view').classList.remove('hidden');
    document.getElementById('profile-view').classList.add('flex');
}
function openSettings() {
    document.getElementById('profile-view').classList.add('hidden');
    document.getElementById('profile-view').classList.remove('flex');
    document.getElementById('settings-view').classList.remove('hidden');
    document.getElementById('settings-view').classList.add('flex');
}

function getProfileData() {
    return JSON.parse(localStorage.getItem('metaAINotes_profileData') || '{"name":"My Account","apis":[]}');
}
function saveProfileData(data) {
    localStorage.setItem('metaAINotes_profileData', JSON.stringify(data));
}

function renderProfilePage() {
    const data = getProfileData();
    const name = data.name || 'My Account';
    const activeIndex = data.apis.findIndex(a => a.isActive);
    const titleEls = document.querySelectorAll('#profileDisplayName, .shared-profile-pic + div h2');
    titleEls.forEach(el => { if(el) el.textContent = name; });
    const sub = document.getElementById('apiConfigRowSubtitle');
    if (sub) {
        if (data.apis.length === 0) sub.textContent = 'কোনো API যোগ করা হয়নি';
        else if (activeIndex > -1) sub.textContent = `Active: ${data.apis[activeIndex].name}`;
        else sub.textContent = `${data.apis.length}টি API configured`;
    }
}

function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function maskApiKey(key) { if (!key) return 'No key'; if (key.length <= 8) return '••••••••'; return key.substring(0, 4) + '••••' + key.slice(-4); }

function renderApiList(data) {
    const container = document.getElementById('apiListContainer');
    const emptyState = document.getElementById('apiEmptyState');
    if (!data.apis || data.apis.length === 0) {
        container.innerHTML = ''; emptyState.classList.remove('hidden'); emptyState.classList.add('flex'); return;
    }
    emptyState.classList.add('hidden'); emptyState.classList.remove('flex');
    container.innerHTML = data.apis.map((api, index) => `
        <div class="bg-white rounded-md border ${api.isActive ? 'border-blue-400 shadow-md ring-1 ring-blue-100' : 'border-gray-200 shadow-sm'} overflow-hidden flex flex-col transition-all">
            <div class="flex items-center gap-3 px-4 py-3.5 border-b border-gray-100">
                <div class="w-8 h-8 rounded-md ${api.isActive ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'} flex items-center justify-center shrink-0"><span class="text-[13px] font-bold">${index + 1}</span></div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap"><span class="text-[15px] font-semibold text-gray-800 truncate">${escapeHtml(api.name)}</span>${api.isActive ? `<span class="shrink-0 inline-flex items-center gap-1.5 px-2 py-0.5 bg-blue-50 text-blue-700 text-[10px] font-bold rounded-md uppercase tracking-wider border border-blue-200"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>Active</span>` : ''}</div>
                    <div class="text-[12px] text-gray-500 truncate mt-0.5 flex items-center gap-1.5 font-mono"><span class="font-sans text-gray-400 font-medium">${api.version ? escapeHtml(api.version) : 'No model'}</span><span class="text-gray-300">•</span><span>${maskApiKey(api.key)}</span></div>
                </div>
            </div>
            <div class="flex bg-gray-50">
                ${!api.isActive ? `<button onclick="setActiveApi(${index})" class="flex-1 py-2 text-[13px] font-medium text-blue-600 hover:bg-blue-100 border-r border-gray-200">Set Active</button>` : `<div class="flex-1 py-2 text-[13px] font-medium text-green-600 flex items-center justify-center gap-1.5 select-none border-r border-gray-200 bg-green-50/50">Currently Active</div>`}
                <button onclick="openEditApiModal(${index})" class="px-4 py-2 text-[13px] font-medium text-gray-600 hover:bg-gray-200 border-r border-gray-200">Edit</button>
                <button onclick="deleteApi(${index})" class="px-4 py-2 text-[13px] font-medium text-red-600 hover:bg-red-100">Delete</button>
            </div>
        </div>
    `).join('');
}

window.openApiConfigPage = function() {
    const page = document.getElementById('apiConfigPageOverlay');
    page.classList.remove('hidden'); page.classList.add('flex');
    setTimeout(() => page.classList.remove('translate-x-full'), 10);
    const data = getProfileData(); renderApiList(data); document.getElementById('apiConfigCountBadge').textContent = data.apis.length;
};
window.closeApiConfigPage = function() {
    const page = document.getElementById('apiConfigPageOverlay');
    page.classList.add('translate-x-full'); setTimeout(() => { page.classList.add('hidden'); page.classList.remove('flex'); }, 300);
};

window.openAddApiModal = function() {
    document.getElementById('apiPageTitle').textContent = 'Add New API'; document.getElementById('apiEditIndex').value = '-1';['apiInputName','apiInputKey','apiInputVersion','apiInputEndpoint'].forEach(id => document.getElementById(id).value = '');
    showApiPage();
};
window.openEditApiModal = function(index) {
    const data = getProfileData(); const api = data.apis[index];
    document.getElementById('apiPageTitle').textContent = 'Edit API Config'; document.getElementById('apiEditIndex').value = index;
    document.getElementById('apiInputName').value = api.name || ''; document.getElementById('apiInputKey').value = api.key || ''; document.getElementById('apiInputVersion').value = api.version || ''; document.getElementById('apiInputEndpoint').value = api.endpoint || '';
    showApiPage();
};
function showApiPage() {
    const page = document.getElementById('apiPageOverlay'); page.classList.remove('hidden'); page.classList.add('flex'); setTimeout(() => page.classList.remove('translate-x-full'), 10);
}
window.closeApiPage = function() {
    const page = document.getElementById('apiPageOverlay'); page.classList.add('translate-x-full'); setTimeout(() => { page.classList.add('hidden'); page.classList.remove('flex'); }, 300);
};

window.saveApiFromPage = function() {
    const name = document.getElementById('apiInputName').value.trim(); 
    const key = document.getElementById('apiInputKey').value.trim();
    const version = document.getElementById('apiInputVersion').value.trim(); 
    const endpoint = document.getElementById('apiInputEndpoint').value.trim();
    
    if (!name) { showToast('API Name দিতে হবে।', 'error'); return; } 
    if (!key) { showToast('API Key দিতে হবে।', 'error'); return; }
    
    const data = getProfileData(); 
    const editIndex = parseInt(document.getElementById('apiEditIndex').value);
    const apiObj = { name, key, version, endpoint, isActive: false };
    
    if (editIndex > -1) { 
        apiObj.isActive = data.apis[editIndex].isActive; 
        data.apis[editIndex] = apiObj; 
        showToast('API আপডেট হয়েছে!', 'success'); 
    } else { 
        if (data.apis.length === 0) apiObj.isActive = true; 
        data.apis.push(apiObj); 
        showToast('নতুন API যুক্ত হয়েছে!', 'success'); 
    }
    
    if (apiObj.isActive) {
        localStorage.setItem('metaAINotes_activeModel', apiObj.version || apiObj.name);
    }
    
    saveProfileData(data); 
    closeApiPage(); 
    renderProfilePage(); 
    openApiConfigPage();
};

window.setActiveApi = function(index) { 
    const data = getProfileData(); 
    data.apis.forEach((a, i) => a.isActive = (i === index)); 
    
    const activeModel = data.apis[index].version || data.apis[index].name;
    localStorage.setItem('metaAINotes_activeModel', activeModel);
    
    saveProfileData(data); 
    renderProfilePage(); 
    openApiConfigPage(); 
    showToast(`"${data.apis[index].name}" সক্রিয় করা হয়েছে!`, 'success'); 
};
window.deleteApi = function(index) { if (!confirm('এই API টি মুছে দিতে চান?')) return; const data = getProfileData(); const wasActive = data.apis[index].isActive; data.apis.splice(index, 1); if (wasActive && data.apis.length > 0) data.apis[0].isActive = true; saveProfileData(data); renderProfilePage(); openApiConfigPage(); showToast('API মুছে ফেলা হয়েছে!', 'success'); };
window.toggleApiKeyVisibility = function() {
    const input = document.getElementById('apiInputKey'); const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') { input.type = 'text'; icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'; } 
    else { input.type = 'password'; icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'; }
};

window.openProfileEditModal = function() {
    const data = getProfileData(); document.getElementById('profileNameInput').value = data.name || '';
    const modal = document.getElementById('profileEditModal'); const content = document.getElementById('profileEditModalContent');
    modal.classList.remove('hidden'); modal.classList.add('flex'); setTimeout(() => content.style.transform = 'translateY(0)', 10);
};
window.closeProfileEditModal = function() {
    const modal = document.getElementById('profileEditModal'); const content = document.getElementById('profileEditModalContent');
    content.style.transform = 'translateY(100%)'; setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); content.style.transform = ''; }, 300);
};
window.saveProfileName = function() {
    const name = document.getElementById('profileNameInput').value.trim(); if (!name) return;
    const data = getProfileData(); data.name = name; saveProfileData(data); closeProfileEditModal(); renderProfilePage(); showToast('প্রোফাইল আপডেট হয়েছে!', 'success');
};

window.triggerApiImport = function() { document.getElementById('importApiConfigInput').click(); };
window.handleApiImport = function(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const jsonConfig = JSON.parse(e.target.result);
            let apisToImport = Array.isArray(jsonConfig) ? jsonConfig : (jsonConfig.apis && Array.isArray(jsonConfig.apis) ? jsonConfig.apis : null);
            if (!apisToImport) throw new Error();
            const data = getProfileData(); let importedCount = 0;
            apisToImport.forEach(item => {
                if (item.apiKey && !data.apis.some(api => api.version === item.model && api.key === item.apiKey)) {
                    data.apis.push({ name: item.name || "Unnamed API", key: item.apiKey, version: item.model || "", endpoint: item.endpoint || "", isActive: data.apis.length === 0 && importedCount === 0 }); importedCount++;
                }
            });
            if (importedCount > 0) { saveProfileData(data); renderProfilePage(); openApiConfigPage(); showToast(`${importedCount} API Models imported!`, 'success'); } 
            else showToast(`No new models imported.`, 'error');
        } catch (err) { showToast('Error importing file!', 'error'); }
        event.target.value = ''; 
    }; reader.readAsText(file);
};

window.confirmClearAllData = function() {
    if (!confirm('সমস্ত notes, sessions এবং API data মুছে দেওয়া হবে। আপনি কি নিশ্চিত?')) return;['metaAINotes_sessions','metaAINotes_currentSession','metaAINotes_apiLimit','metaAINotes_modelStatuses','metaAINotes_modelResetTimes','metaAINotes_activeModel'].forEach(k => localStorage.removeItem(k));
    showToast('সমস্ত ডাটা মুছে ফেলা হয়েছে।', 'su hiccess'); renderProfilePage();
};

window.addEventListener('DOMContentLoaded', () => { renderProfilePage(); });
</script>
</body>
</html>
