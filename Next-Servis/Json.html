
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JSON Form Generator PRO</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Hide Scrollbar but keep functionality */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    body { background-color: #fafafa; }

    /* Glass Effects for Header and Footer */
    .glass-header { 
      background: rgba(255, 255, 255, 0.7); 
      backdrop-filter: blur(16px); 
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    
    .glass-footer { 
      background: rgba(255, 255, 255, 0.7); 
      backdrop-filter: blur(16px); 
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* Spring Animation */
    .ease-spring { transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-pop { animation: popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .animate-slide-down { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Animated Download Button */
    .dl-wrapper { display: flex; align-items: center; justify-content: center; }
    .dl-wrapper .label {
      background-color: transparent; border: 2px solid #18181b; 
      display: flex; align-items: center; border-radius: 8px; 
      width: 110px; cursor: pointer; transition: all 0.4s ease;
      padding: 3px; position: relative; margin: 0; height: 38px;
    }
    .dl-wrapper .label .input { display: none; }
    .dl-wrapper .label .title { font-size: 13px; font-weight: 700; color: #18181b; transition: all 0.3s ease; position: absolute; right: 12px; bottom: 8px; text-align: center; }
    .dl-wrapper .label .input:checked ~ .title:first-of-type { opacity: 0; visibility: hidden; transform: translateX(10px); }
    .dl-wrapper .label .title:last-child { opacity: 0; visibility: hidden; color: #10b981; }
    .dl-wrapper .label .circle {
      height: 26px; width: 26px; border-radius: 5px; 
      background-color: #18181b; display: flex; justify-content: center; align-items: center;
      transition: all 0.4s ease; position: relative; overflow: hidden;
    }
    .dl-wrapper .label .circle .icon { color: #fff; width: 16px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: all 0.4s ease; }
    .dl-wrapper .label .circle::before { content: ""; position: absolute; left: 0; top: 0; background-color: #3f3f46; width: 100%; height: 0; transition: all 0.4s ease; }
    
    .dl-wrapper .label:has(.input:checked) { width: 38px; animation: dl-installed 0.4s ease 3.5s forwards; border-color: transparent; }
    .dl-wrapper .label .input:checked + .circle { animation: dl-pulse 1s forwards, dl-circleDelete 0.2s ease 3.5s forwards; rotate: 180deg; }
    .dl-wrapper .label .input:checked + .circle::before { animation: dl-installing 3s ease-in-out forwards; }
    .dl-wrapper .label .input:checked ~ .title:last-child { animation: dl-showInstalledMessage 0.4s ease 3.5s forwards; }

    @keyframes dl-pulse { 0% { scale: 0.95; box-shadow: 0 0 0 0 rgba(24, 24, 27, 0.4); } 70% { scale: 1; box-shadow: 0 0 0 8px rgba(24, 24, 27, 0); } 100% { scale: 0.95; box-shadow: 0 0 0 0 rgba(24, 24, 27, 0); } }
    @keyframes dl-installing { from { height: 0; } to { height: 100%; } }
    @keyframes dl-installed { 100% { width: 85px; border-color: #10b981; } }
    @keyframes dl-circleDelete { 100% { opacity: 0; visibility: hidden; } }
    @keyframes dl-showInstalledMessage { 100% { opacity: 1; visibility: visible; right: 22px; } }

    /* Modern Loader */
    .app-loader { width: 40px; height: 40px; border: 4px solid #e4e4e7; border-top: 4px solid #18181b; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Number Input Reset */
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Floating Nav Transition */
    .bottom-nav { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s; will-change: transform, opacity; }
    .bottom-nav-hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
    
    /* Code block */
    pre { background: #09090b; color: #f4f4f5; padding: 1.25rem; border-radius: 0.75rem; overflow-x: auto; font-size: 0.875rem; line-height: 1.5; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  </style>
</head>
<body class="text-zinc-800 selection:bg-zinc-800 selection:text-white">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- API Templates Database ---
    const API_TEMPLATES = [
      { name: 'GitHub', model: 'gpt-4o', endpoint: 'https://models.github.ai/inference/chat/completions' },
      { name: 'Anthropic', model: 'claude-3-opus-20240229', endpoint: 'https://api.anthropic.com/v1/messages' },
      { name: 'Gemini', model: 'gemini-1.5-pro', endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent' },
      { name: 'Groq', model: 'llama3-70b-8192', endpoint: 'https://api.groq.com/openai/v1/chat/completions' },
      { name: 'OpenRouter', model: 'openai/gpt-4o', endpoint: 'https://openrouter.ai/api/v1/chat/completions' }
    ];

    // --- Components ---

    const AnimatedDownloadButton = ({ onDownload, disabled }) => {
      const [checked, setChecked] = useState(false);
      const handleChange = () => { 
        if (disabled || checked) return; 
        setChecked(true); 
        setTimeout(() => { onDownload(); setTimeout(() => setChecked(false), 3000); }, 3500); 
      };
      return (
        <div className="dl-wrapper" style={{ opacity: disabled ? 0.5 : 1, pointerEvents: disabled || checked ? 'none' : 'auto' }}>
          <label className="label">
            <input type="checkbox" className="input" checked={checked} onChange={handleChange} />
            <span className="circle"><svg className="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 19V5m0 14-4-4m4 4 4-4" /></svg></span>
            <p className="title">Export</p><p className="title">Done!</p>
          </label>
        </div>
      );
    };

    const ConfigCard = ({ config, index, onChange, onRemove, onDuplicate, onFocusChange }) => {
      const [showKey, setShowKey] = useState(false);
      const [showTemplates, setShowTemplates] = useState(false);

      const applyTemplate = (template) => {
        onChange(config.id, 'name', template.name);
        onChange(config.id, 'model', template.model);
        onChange(config.id, 'endpoint', template.endpoint);
        setShowTemplates(false);
      };

      return (
        <div className="bg-white p-6 rounded-2xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-zinc-200/80 relative w-[88vw] max-w-[88vw] sm:w-[360px] sm:max-w-[360px] flex-none snap-center animate-fade-in group flex flex-col h-full">
          
          {/* Card Header Locked Layout */}
          <div className="flex justify-between items-start mb-6 h-10">
            <div className="flex items-center gap-3 w-[60%]">
              <span className="flex-none flex items-center justify-center w-8 h-8 bg-zinc-900 text-white text-xs font-black rounded-lg shadow-md">{index + 1}</span>
              <div className="flex-1 min-w-0 pr-2">
                <h2 className="text-lg font-bold text-zinc-900 leading-tight truncate">API Config</h2>
                <p className="text-[10px] font-semibold text-zinc-400 uppercase tracking-wider truncate">{config.name || 'Untitled Model'}</p>
              </div>
            </div>
            
            {/* Buttons Group */}
            <div className="flex-none flex items-center gap-1 bg-zinc-50 rounded-lg p-1 border border-zinc-100 relative">
              <button onClick={() => setShowTemplates(!showTemplates)} className="text-zinc-400 hover:text-indigo-600 p-1.5 rounded-md hover:bg-indigo-50 transition-colors" title="Quick Templates">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
              </button>
              
              <button onClick={() => onDuplicate(config)} className="text-zinc-400 hover:text-blue-600 p-1.5 rounded-md hover:bg-blue-50 transition-colors" title="Duplicate">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              </button>

              <button onClick={() => onRemove(config.id)} className="text-zinc-400 hover:text-red-600 p-1.5 rounded-md hover:bg-red-50 transition-colors" title="Delete">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
              </button>

              {/* Floating Dropdown Menu */}
              {showTemplates && (
                <div className="absolute right-0 top-full mt-2 w-52 p-2 bg-white/95 backdrop-blur-xl border border-zinc-200 rounded-xl shadow-2xl z-50 animate-pop">
                  <div className="flex justify-between items-center mb-2 px-2 pt-1">
                    <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Select Template</p>
                    <button onClick={() => setShowTemplates(false)} className="text-zinc-400 hover:text-zinc-800 p-0.5">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                  </div>
                  <div className="flex flex-col gap-1">
                    {API_TEMPLATES.map(temp => (
                      <button key={temp.name} onClick={() => applyTemplate(temp)} className="text-left text-xs font-bold bg-transparent text-zinc-700 px-3 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-700 transition-colors w-full flex justify-between items-center group">
                        <span>{temp.name}</span>
                        <span className="text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">Apply ➔</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          <div className="space-y-4 flex-1">
            {/* Name Input */}
            <div>
              <label className="block text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5 ml-1">Name</label>
              <input type="text" value={config.name} onChange={(e) => onChange(config.id, 'name', e.target.value)} onFocus={() => onFocusChange(true)} onBlur={() => setTimeout(() => onFocusChange(false), 100)} placeholder="e.g. Production API" className="w-full p-3 h-11 bg-zinc-50/50 border border-zinc-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 outline-none transition-all text-sm font-medium text-zinc-900 placeholder-zinc-400" />
            </div>
            
            {/* API Key Input */}
            <div>
              <label className="block text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5 ml-1">API Key</label>
              <div className="relative">
                <input type={showKey ? "text" : "password"} value={config.apiKey} onChange={(e) => onChange(config.id, 'apiKey', e.target.value)} onFocus={() => onFocusChange(true)} onBlur={() => setTimeout(() => onFocusChange(false), 100)} placeholder="sk-..." className="w-full p-3 h-11 pr-12 bg-zinc-50/50 border border-zinc-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 outline-none transition-all font-mono text-sm font-medium text-zinc-900 placeholder-zinc-400" />
                <button type="button" onClick={() => setShowKey(!showKey)} className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-800 transition-colors p-1.5 bg-white rounded-md border border-zinc-100 shadow-sm flex items-center justify-center">
                  {showKey ? 
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg> 
                    : 
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                  }
                </button>
              </div>
            </div>

            {/* Model & Endpoint Input */}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="block text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5 ml-1">Model</label>
                <input type="text" value={config.model} onChange={(e) => onChange(config.id, 'model', e.target.value)} onFocus={() => onFocusChange(true)} onBlur={() => setTimeout(() => onFocusChange(false), 100)} placeholder="gpt-4o" className="w-full p-3 h-11 bg-zinc-50/50 border border-zinc-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 outline-none transition-all text-sm font-medium text-zinc-900 placeholder-zinc-400" />
              </div>
              <div>
                <label className="block text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5 ml-1">Endpoint</label>
                <input type="url" value={config.endpoint} onChange={(e) => onChange(config.id, 'endpoint', e.target.value)} onFocus={() => onFocusChange(true)} onBlur={() => setTimeout(() => onFocusChange(false), 100)} placeholder="https://..." className="w-full p-3 h-11 bg-zinc-50/50 border border-zinc-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 outline-none transition-all text-sm font-medium text-zinc-900 placeholder-zinc-400" />
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- Main App ---
    function App() {
      const [configs, setConfigs] = useState(() => {
        const saved = localStorage.getItem('proJsonConfigs');
        if (saved) {
          try { return JSON.parse(saved); } catch(e) { return [{ id: Date.now(), name: '', apiKey: '', model: '', endpoint: '' }]; }
        }
        return [{ id: Date.now(), name: '', apiKey: '', model: '', endpoint: '' }];
      });
      
      const [isLoading, setIsLoading] = useState(false); 
      const [notification, setNotification] = useState(null); 
      const [jumpValue, setJumpValue] = useState('');
      const [isKeyboardOpen, setIsKeyboardOpen] = useState(false);
      const [showPreview, setShowPreview] = useState(false);
      const [activeIndex, setActiveIndex] = useState(0);
      
      const scrollContainerRef = useRef(null);
      const notificationTimeoutRef = useRef(null);
      const fileInputRef = useRef(null);
      const initialHeight = useRef(window.innerHeight);

      useEffect(() => { localStorage.setItem('proJsonConfigs', JSON.stringify(configs)); }, [configs]);

      useEffect(() => {
        const handleResize = () => { setIsKeyboardOpen(window.innerHeight < initialHeight.current - 120); };
        const handleFocusIn = (e) => { if (e.target.tagName === 'INPUT') setIsKeyboardOpen(true); };
        
        window.addEventListener('resize', handleResize);
        window.addEventListener('focusin', handleFocusIn);
        return () => { window.removeEventListener('resize', handleResize); window.removeEventListener('focusin', handleFocusIn); };
      }, []);

       

      const showNotify = (text, type = 'success') => {
        if (notificationTimeoutRef.current) clearTimeout(notificationTimeoutRef.current);
        setNotification({ id: Date.now(), text, type });
        notificationTimeoutRef.current = setTimeout(() => setNotification(null), 3000);
      };

      const scrollToIndex = useCallback((index) => {
        if (scrollContainerRef.current) {
          const cards = scrollContainerRef.current.children;
          if (cards[index]) {
            cards[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            setActiveIndex(index);
          }
        }
      }, []);

      const handleJumpChange = (e) => {
        const val = e.target.value;
        setJumpValue(val);
        const idx = parseInt(val);
        if (idx >= 1 && idx <= configs.length) scrollToIndex(idx - 1);
      };
      useEffect(() => { setJumpValue(''); }, [configs.length]);

      const handleScroll = () => {
        if (!scrollContainerRef.current || configs.length === 0) return;
        const container = scrollContainerRef.current;
        const scrollLeft = container.scrollLeft;
        const cardWidth = container.children[0]?.offsetWidth || 0;
        const gap = 20;
        const totalWidth = cardWidth + gap;
        const newIndex = Math.round(scrollLeft / totalWidth);
        
        if (newIndex !== activeIndex && newIndex >= 0 && newIndex < configs.length) {
          setActiveIndex(newIndex);
        }
      };

      const goPrev = () => scrollToIndex(Math.max(0, activeIndex - 1));
      const goNext = () => scrollToIndex(Math.min(configs.length - 1, activeIndex + 1));

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        setIsLoading(true); 
        const reader = new FileReader();
        reader.onload = (e) => {
          setTimeout(() => {
            try {
              const json = JSON.parse(e.target.result);
              if (Array.isArray(json)) {
                setConfigs(json.map((item, index) => ({ id: Date.now() + index, name: item.name || '', apiKey: item.apiKey || '', model: item.model || '', endpoint: item.endpoint || '' })));
                showNotify('File imported successfully!');
                setActiveIndex(0);
              } else {
                showNotify('Invalid JSON format.', 'error');
              }
            } catch (err) { showNotify('Error parsing JSON.', 'error'); }
            setIsLoading(false); 
          }, 800);
        };
        reader.readAsText(file);
        event.target.value = null;
      };

      const handleAddConfig = () => {
        setConfigs(prev => [...prev, { id: Date.now(), name: '', apiKey: '', model: '', endpoint: '' }]);
        showNotify('New Model Added');
        setTimeout(() => scrollToIndex(configs.length), 100);
      };

      const handleDuplicate = (configToCopy) => {
        const newConfig = { ...configToCopy, id: Date.now(), name: `${configToCopy.name} (Copy)` };
        setConfigs(prev => {
          const newConfigs = [...prev];
          newConfigs.splice(activeIndex + 1, 0, newConfig); 
          return newConfigs;
        });
        showNotify('Model Duplicated');
        setTimeout(() => scrollToIndex(activeIndex + 1), 100);
      };

      const handleRemoveConfig = (id) => {
        if (configs.length > 1) {
          setConfigs(configs.filter(c => c.id !== id));
          showNotify('Model Removed');
          if (activeIndex >= configs.length - 1) setActiveIndex(Math.max(0, configs.length - 2));
        } else {
          setConfigs([{ id: Date.now(), name: '', apiKey: '', model: '', endpoint: '' }]);
        }
      };

      const handleClearAll = () => {
        if(confirm("Are you sure you want to clear all configurations? This cannot be undone.")) {
          setConfigs([{ id: Date.now(), name: '', apiKey: '', model: '', endpoint: '' }]);
          setActiveIndex(0);
          showNotify('All Data Cleared');
        }
      };

      const handleChange = (id, field, value) => {
        setConfigs(configs.map(c => c.id === id ? { ...c, [field]: value } : c));
      };

      const getCleanData = () => configs.map(({ name, apiKey, model, endpoint }) => ({ name, apiKey, model, endpoint }));

      const handleDownload = () => {
        const blob = new Blob([JSON.stringify(getCleanData(), null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'api_configs.json'; a.click();
        URL.revokeObjectURL(url);
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(JSON.stringify(getCleanData(), null, 2));
        showNotify('JSON Copied to Clipboard!');
        setShowPreview(false);
      };

      return (
        <div className="min-h-screen pb-32 relative">
          
          {/* Smart Notification */}
          {notification && (
            <div key={notification.id} className="fixed top-6 left-1/2 -translate-x-1/2 z-[150] bg-zinc-900 text-white px-5 py-3 rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] flex items-center gap-3 animate-slide-down font-bold text-sm whitespace-nowrap border border-zinc-700">
              {notification.type === 'error' ? 
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> :
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
              }
              {notification.text}
            </div>
          )}

          {/* Loader */}
          {isLoading && (
            <div className="fixed inset-0 z-[100] bg-white/80 backdrop-blur-sm flex justify-center items-center">
              <div className="app-loader"></div>
            </div>
          )}

          {/* Code Preview Modal */}
          {showPreview && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-zinc-900/60 backdrop-blur-sm animate-fade-in">
              <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-pop border border-zinc-200">
                <div className="flex justify-between items-center p-5 border-b border-zinc-100 bg-zinc-50/50">
                  <h3 className="font-bold text-zinc-800 flex items-center gap-2 text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                    JSON Preview
                  </h3>
                  <button onClick={() => setShowPreview(false)} className="text-zinc-400 hover:text-zinc-900 bg-zinc-100 hover:bg-zinc-200 p-2 rounded-xl transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                </div>
                <div className="p-5 max-h-[60vh] overflow-y-auto bg-zinc-950">
                  <pre><code>{JSON.stringify(getCleanData(), null, 2)}</code></pre>
                </div>
                <div className="p-5 bg-zinc-50 border-t border-zinc-100">
                  <button onClick={copyToClipboard} className="w-full bg-zinc-900 text-white font-bold py-3.5 rounded-xl hover:bg-zinc-800 transition-colors flex items-center justify-center gap-2 shadow-lg active:scale-[0.98]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> 
                    Copy JSON
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Top Header */}
          <header className="glass-header p-4 sticky top-0 z-20 flex justify-between items-center gap-2">
            
            <div className="flex items-center gap-2">
              <div className="relative group">
                <input type="number" value={jumpValue} onChange={handleJumpChange} onFocus={() => setIsKeyboardOpen(true)} onBlur={() => setTimeout(() => setIsKeyboardOpen(false), 100)} placeholder={configs.length} className="h-[38px] w-[48px] rounded-lg bg-zinc-100 text-zinc-900 border border-zinc-200 flex items-center justify-center font-black text-sm text-center focus:outline-none focus:ring-2 focus:ring-zinc-900/20 transition-all placeholder-zinc-400" />
              </div>
              
              <button onClick={() => setShowPreview(true)} className="p-2 h-[38px] w-[38px] rounded-lg bg-white text-zinc-700 border border-zinc-200 hover:border-zinc-400 shadow-sm transition-all flex items-center justify-center group" title="Preview JSON">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="group-hover:scale-110 transition-transform"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>

            <div className="flex items-center gap-2">
              {configs.length > 1 && (
                <button onClick={handleClearAll} className="p-2 h-[38px] w-[38px] rounded-lg bg-red-50 text-red-500 border border-red-100 hover:bg-red-100 transition-all flex items-center justify-center" title="Clear All">
                   <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
              )}

              <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
              <button onClick={() => fileInputRef.current.click()} className="p-2 h-[38px] w-[38px] rounded-lg bg-white text-zinc-700 border border-zinc-200 hover:border-zinc-400 shadow-sm transition-all flex items-center justify-center group" title="Import JSON">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="group-hover:-translate-y-0.5 transition-transform"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              </button>

              <AnimatedDownloadButton onDownload={handleDownload} disabled={configs.length === 0 || (configs.length === 1 && !configs[0].name)} />
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-md mx-auto pt-6 w-full flex flex-col items-center">
            
            {configs.length === 0 && !isLoading && (
              <div className="flex flex-col items-center justify-center pt-20 px-6 text-center animate-fade-in">
                <div className="w-24 h-24 bg-zinc-100 rounded-full flex items-center justify-center mb-6 border-8 border-white shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" className="text-zinc-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                </div>
                <h3 className="text-xl font-black text-zinc-800">No Configurations</h3>
                <p className="text-zinc-500 mt-2 text-sm font-medium">Click the Add Model button below or import a JSON file to get started.</p>
              </div>
            )}

            <div 
              ref={scrollContainerRef} 
              onScroll={handleScroll}
              className="flex overflow-x-auto snap-x snap-mandatory gap-5 px-5 pb-8 hide-scrollbar items-center w-full"
            >
              {configs.map((config, index) => (
                <ConfigCard 
                  key={config.id} 
                  config={config} 
                  index={index} 
                  onChange={handleChange} 
                  onRemove={handleRemoveConfig} 
                  onDuplicate={handleDuplicate}
                  onFocusChange={setIsKeyboardOpen}
                />
              ))}
            </div>

            {/* Bottom Navigation (Matched with Header) */}
            <div className={`bottom-nav fixed bottom-0 left-0 w-full z-30 glass-footer p-4 ${isKeyboardOpen || configs.length === 0 ? 'bottom-nav-hidden' : ''}`}>
              
              {/* Pagination Dots (Moved to top of footer) */}
              {configs.length > 1 && (
                <div className="absolute -top-6 left-1/2 -translate-x-1/2 flex items-center gap-2">
                  {configs.map((_, i) => (
                    <button 
                      key={i} 
                      onClick={() => scrollToIndex(i)} 
                      className={`h-1.5 rounded-full transition-all duration-300 ease-out ${i === activeIndex ? 'w-5 bg-zinc-800' : 'w-1.5 bg-zinc-300 hover:bg-zinc-400'}`}
                      aria-label={`Go to card ${i + 1}`}
                    />
                  ))}
                </div>
              )}

              <div className="flex items-center justify-between gap-2 max-w-md mx-auto">
                <button 
                  onClick={goPrev} 
                  disabled={activeIndex === 0} 
                  className="p-2 h-[38px] w-[38px] rounded-lg bg-white text-zinc-700 border border-zinc-200 hover:border-zinc-400 shadow-sm transition-all flex items-center justify-center disabled:opacity-40 disabled:hover:border-zinc-200 shrink-0"
                  aria-label="Previous"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                
                <button 
                  onClick={handleAddConfig} 
                  className="flex-1 flex items-center justify-center gap-2 px-6 h-[38px] bg-white text-zinc-800 border border-zinc-200 rounded-lg font-bold shadow-sm hover:border-zinc-400 active:scale-95 transition-all text-sm shrink-0"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                  Add Model
                </button>

                <button 
                  onClick={goNext} 
                  disabled={activeIndex === configs.length - 1} 
                  className="p-2 h-[38px] w-[38px] rounded-lg bg-white text-zinc-700 border border-zinc-200 hover:border-zinc-400 shadow-sm transition-all flex items-center justify-center disabled:opacity-40 disabled:hover:border-zinc-200 shrink-0"
                  aria-label="Next"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m9 18 6-6-6-6"/></svg>
                </button>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
